<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年DM合宿投資計画</title>
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f7f8fa;
    --accent: #4a6fa5;
    --accent2: #e8a838;
    --gold: #e8a838;
    --text: #1e2433;
    --muted: #7a8299;
    --border: #dde2ea;
    --pass: #3aaa7e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif; min-height: 100vh; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* ヘッダー */
  .app-header { background: var(--accent); padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  .app-header .back-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
  .app-header .title { color: white; font-weight: 700; font-size: 15px; }
  .app-header .sub { color: rgba(255,255,255,0.8); font-size: 13px; margin-left: auto; }

  /* ADMIN */
  #admin-screen { padding: 20px; max-width: 700px; margin: 0 auto; }
  .page-title { text-align: center; padding: 24px 0 18px; font-size: 22px; font-weight: 800; color: var(--accent); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .card h2 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .plan-inputs { display: flex; flex-direction: column; gap: 8px; }
  .plan-row { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; }
  .plan-row input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; width: 100%; }
  .plan-row input:focus { outline: none; border-color: var(--accent); background: #fff; }
  .primary-btn { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; }
  .primary-btn:hover { opacity: 0.9; }
  .hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }

  /* NAME SELECT */
  #name-select-screen { max-width: 500px; margin: 0 auto; padding: 0 20px 40px; }
  .name-select-header { text-align: center; padding: 32px 0 24px; }
  .name-select-header h1 { font-size: 22px; font-weight: 700; }
  .name-select-header p { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .name-grid { display: flex; flex-direction: column; gap: 10px; }
  .name-btn { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 16px 18px; cursor: pointer; color: var(--text); font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); transition: all 0.15s; }
  .name-btn:hover { border-color: var(--accent); background: #eef2fa; }
  .name-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }

  /* HOME */
  #home-screen { max-width: 500px; margin: 0 auto; }
  .home-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .home-welcome { background: var(--surface); border-radius: 14px; padding: 20px; text-align: center; border: 1px solid var(--border); }
  .home-avatar-lg { width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: white; font-size: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
  .home-name-label { font-size: 20px; font-weight: 800; }
  .home-voted-badge { font-size: 12px; color: var(--pass); font-weight: 600; margin-top: 4px; }
  .change-link { font-size: 12px; color: var(--accent); background: none; border: none; cursor: pointer; margin-top: 6px; display: inline-block; text-decoration: underline; }
  .home-action-btn { border: none; border-radius: 14px; padding: 18px 20px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; gap: 14px; text-align: left; }
  .home-action-btn .btn-icon { font-size: 26px; flex-shrink: 0; }
  .home-action-btn .btn-label { display: flex; flex-direction: column; gap: 2px; }
  .home-action-btn .btn-sub { font-size: 12px; font-weight: 400; opacity: 0.75; }
  .btn-comment { background: var(--accent); color: white; }
  .btn-vote { background: var(--surface); color: var(--text); border: 2px solid var(--border); }
  .home-secondary { display: flex; justify-content: center; gap: 16px; padding-top: 4px; }
  .home-secondary button { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; text-decoration: underline; }

  /* COMMENT */
  #comment-screen { min-height: 100vh; }
  .comment-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; max-width: 500px; margin: 0 auto; }
  .section-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .comment-textarea { width: 100%; border: 2px solid var(--border); border-radius: 12px; padding: 14px; font-size: 15px; font-family: inherit; resize: none; height: 130px; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.2s; }
  .comment-textarea:focus { border-color: var(--accent); }
  /* 提案チップ（コンパクト2列グリッド） */
  .plan-chips { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .plan-chip { background: var(--surface); border: 2px solid var(--border); border-radius: 10px; padding: 10px 12px; cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; transition: all 0.15s; line-height: 1.3; }
  .plan-chip:hover { border-color: var(--accent); background: #eef2fa; }
  .plan-chip.selected { border-color: var(--accent); background: var(--accent); color: white; }
  .plan-chip .chip-sub { font-size: 10px; font-weight: 400; opacity: 0.7; display: block; margin-top: 2px; }
  .comment-send-btn { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; }
  .comment-send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* VOTER */
  #voter-screen { min-height: 100vh; display: flex; flex-direction: column; }
  .budget-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; }
  .budget-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .budget-display { display: flex; align-items: center; gap: 12px; }
  .budget-number { font-size: 30px; font-weight: 900; }
  .budget-number.ok { color: var(--pass); }
  .budget-number.warn { color: var(--accent2); }
  .budget-number.over { color: #e05555; }
  .budget-unit { font-size: 13px; color: var(--muted); }
  .budget-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .budget-fill { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; }
  .plans-container { flex: 1; padding: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; }
  .plan-card { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .plan-card.has-vote { border-color: var(--accent); background: #f5f8ff; }
  .plan-card.own-plan { opacity: 0.4; border-style: dashed; pointer-events: none; }
  .plan-name { font-size: 13px; font-weight: 700; word-break: break-all; line-height: 1.4; }
  .plan-proposer { font-size: 11px; color: var(--muted); }
  .own-plan-notice { text-align: center; font-size: 12px; color: var(--muted); padding: 4px 0; }
  .vote-control { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
  .vote-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface2); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .vote-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #eef2fa; }
  .vote-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .vote-amount { font-size: 18px; font-weight: 900; text-align: center; min-width: 40px; }
  .vote-amount .unit { font-size: 10px; color: var(--muted); font-weight: 400; }
  .submit-area { padding: 14px 20px; background: var(--surface); border-top: 1px solid var(--border); }
  .submit-summary { font-size: 13px; color: var(--muted); margin-bottom: 8px; text-align: center; }
  .submit-btn { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; }
  .submit-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* RESULTS */
  #results-screen { min-height: 100vh; }
  .result-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 52px; z-index: 9; }
  .result-tab { flex: 1; padding: 13px; text-align: center; font-size: 13px; font-weight: 600; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; }
  .result-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .results-summary { padding: 14px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; gap: 20px; flex-wrap: wrap; }
  .stat-box { text-align: center; }
  .stat-value { font-size: 26px; font-weight: 900; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .results-grid { padding: 14px 20px; display: flex; flex-direction: column; gap: 12px; }
  .result-card { background: var(--surface); border: 2px solid var(--border); border-radius: 14px; padding: 16px; position: relative; overflow: hidden; }
  .result-card.passed { border-color: var(--pass); background: #f5fdf8; }
  .result-card.passed::before { content: "PASS"; position: absolute; top: 12px; right: 12px; background: var(--pass); color: white; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .result-card.failed::before { content: "FAIL"; position: absolute; top: 12px; right: 12px; background: var(--border); color: var(--muted); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .result-plan-name { font-size: 17px; font-weight: 700; margin-bottom: 2px; padding-right: 60px; }
  .result-proposer { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .result-total { font-size: 28px; font-weight: 900; margin-bottom: 4px; }
  .result-total.pass-color { color: var(--pass); }
  .result-total.fail-color { color: var(--muted); }
  .result-bar-wrap { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
  .result-bar { height: 100%; border-radius: 4px; }
  .voter-breakdown { display: flex; flex-direction: column; gap: 5px; }
  .voter-row { display: flex; align-items: center; gap: 8px; }
  .voter-name-col { width: 64px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .voter-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .voter-bar { height: 100%; border-radius: 3px; background: var(--accent); }
  .voter-vote { width: 56px; text-align: right; font-size: 12px; }
  /* コメント */
  .comments-pane { padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; }
  .comment-plan-group { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .comment-plan-title { padding: 12px 16px; background: var(--surface2); font-size: 13px; font-weight: 700; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .comment-count-badge { font-size: 11px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; }
  .comment-item { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .comment-item:last-child { border-bottom: none; }
  .comment-meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .comment-text-content { font-size: 14px; line-height: 1.6; word-break: break-word; }
  .all-comment-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .comment-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .comment-plan-tag { font-size: 11px; background: #eef2fa; color: var(--accent); padding: 2px 8px; border-radius: 10px; border: 1px solid #ccd5ea; display: inline-block; margin-bottom: 6px; }
  .no-comments { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .results-footer { padding: 14px 20px 30px; display: flex; gap: 8px; }
  .footer-btn { border-radius: 8px; padding: 10px 18px; font-size: 13px; cursor: pointer; }
  .footer-btn-csv { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .footer-btn-reset { background: none; border: 1px solid #e05555; color: #e05555; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; padding: 26px; max-width: 360px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal h3 { font-size: 18px; margin-bottom: 12px; }
  .modal p { color: var(--muted); font-size: 14px; margin-bottom: 20px; line-height: 1.7; white-space: pre-wrap; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; }
  .modal-cancel { background: var(--border); color: var(--muted); }
  .modal-confirm { background: var(--accent); color: white; }

  /* TOAST */
  .toast-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; }
  .toast-popup.open { display: flex; }
  .toast-box { background: white; border-radius: 20px; padding: 32px 24px; text-align: center; max-width: 300px; width: 88%; box-shadow: 0 12px 40px rgba(0,0,0,0.18); }
  .toast-icon { font-size: 48px; margin-bottom: 12px; }
  .toast-title { font-size: 19px; font-weight: 800; margin-bottom: 8px; }
  .toast-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .toast-btn { margin-top: 20px; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; display: block; width: 100%; }
  .toast-link { margin-top: 10px; background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<!-- ADMIN -->
<div id="admin-screen" class="screen active">
  <div style="padding:0 20px;max-width:700px;margin:0 auto;">
    <div class="page-title">2026年DM合宿投資計画</div>
    <div class="card">
      <h2>氏名と事業名を入力</h2>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;font-size:11px;color:var(--muted);padding:0 2px 8px;"><span>氏名</span><span>事業名</span></div>
      <div class="plan-inputs" id="plan-inputs"></div>
    </div>
    <button class="primary-btn" onclick="startSession()">▶ 投票セッション開始</button>
    <p class="hint">入力内容は自動保存されます</p>
  </div>
</div>

<!-- NAME SELECT -->
<div id="name-select-screen" class="screen">
  <div id="name-select-inner" style="max-width:500px;margin:0 auto;padding:0 20px 40px;">
    <div class="name-select-header">
      <h1>自分の名前を選択</h1>
      <p>次回から自動でスキップされます</p>
    </div>
    <div class="name-grid" id="name-grid"></div>
  </div>
</div>

<!-- HOME -->
<div id="home-screen" class="screen">
  <div class="app-header">
    <div class="title">2026年DM合宿投資計画</div>
  </div>
  <div class="home-body">
    <div class="home-welcome">
      <div class="home-avatar-lg" id="home-avatar"></div>
      <div class="home-name-label" id="home-name"></div>
      <div id="home-voted-badge" class="home-voted-badge" style="display:none;">✅ 投票済み</div>
      <button class="change-link" onclick="changeName()">名前を変更する</button>
    </div>
    <button class="home-action-btn btn-comment" onclick="goComment()">
      <span class="btn-icon">💬</span>
      <span class="btn-label">
        <span>意見・質問を記録する</span>
        <span class="btn-sub">質問・改善案・宿題などを入力</span>
      </span>
    </button>
    <button class="home-action-btn btn-vote" onclick="goVote()">
      <span class="btn-icon">🗳️</span>
      <span class="btn-label">
        <span>投票する</span>
        <span class="btn-sub">1,000万円を各提案に配分</span>
      </span>
    </button>
    <div class="home-secondary">
      <button onclick="showResults()">📊 集計・意見を確認する</button>
      <button onclick="showAdmin()">⚙ 設定を編集</button>
    </div>
  </div>
</div>

<!-- COMMENT -->
<div id="comment-screen" class="screen">
  <div class="app-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="title">意見・質問を記録</div>
    <div class="sub" id="comment-voter-label"></div>
  </div>
  <div class="comment-body">
    <div>
      <div class="section-label">内容を入力</div>
      <textarea class="comment-textarea" id="comment-textarea" placeholder="意見・質問・改善案・宿題などを入力"></textarea>
    </div>
    <div>
      <div class="section-label">どの提案について？</div>
      <div class="plan-chips" id="comment-plan-chips"></div>
    </div>
    <button class="comment-send-btn" id="comment-send-btn" onclick="submitComment()" disabled>記録する</button>
  </div>
</div>

<!-- VOTER -->
<div id="voter-screen" class="screen">
  <div class="app-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="title">投票</div>
    <div class="sub" id="voter-info-label"></div>
  </div>
  <div class="budget-bar">
    <div class="budget-label">残り投資可能額</div>
    <div class="budget-display">
      <div class="budget-number ok" id="remaining-display">1,000</div>
      <div class="budget-unit">万円</div>
      <div class="budget-track"><div class="budget-fill" id="budget-fill" style="width:100%;background:var(--pass);"></div></div>
    </div>
  </div>
  <div class="plans-container" id="plans-container"></div>
  <div class="submit-area">
    <div class="submit-summary" id="submit-summary">投資額を配分して「投票を確定」してください</div>
    <button class="submit-btn" id="submit-btn" onclick="confirmSubmit()" disabled>投票を確定する</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results-screen" class="screen">
  <div class="app-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="title">集計・記録</div>
  </div>
  <div class="result-tabs">
    <button class="result-tab active" id="tab-btn-votes" onclick="switchResultTab('votes')">🗳️ 投票結果</button>
    <button class="result-tab" id="tab-btn-comments" onclick="switchResultTab('comments')">💬 意見・質問</button>
  </div>
  <div id="tab-votes">
    <div class="results-summary" id="results-summary"></div>
    <div class="results-grid" id="results-grid"></div>
  </div>
  <div id="tab-comments" style="display:none;">
    <div class="comments-pane" id="comments-pane"></div>
  </div>
  <div class="results-footer">
    <button class="footer-btn footer-btn-csv" onclick="exportResults()">CSV出力</button>
    <button class="footer-btn footer-btn-reset" onclick="confirmReset()">リセット</button>
  </div>
</div>

<!-- MODAL: Submit -->
<div class="modal-overlay" id="submit-modal">
  <div class="modal">
    <h3>投票内容の確認</h3>
    <p id="submit-modal-text"></p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('submit-modal')">見直す</button>
      <button class="modal-confirm" onclick="submitVote()">確定する</button>
    </div>
  </div>
</div>

<!-- MODAL: Reset -->
<div class="modal-overlay" id="reset-modal">
  <div class="modal">
    <h3>全データをリセット</h3>
    <p>投票・コメントすべてのデータが削除されます。</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('reset-modal')">キャンセル</button>
      <button class="modal-confirm" onclick="resetAll()">リセット</button>
    </div>
  </div>
</div>

<!-- 投票完了 -->
<div class="toast-popup" id="vote-done-popup">
  <div class="toast-box">
    <div class="toast-icon">✅</div>
    <div class="toast-title" style="color:var(--pass);">投票完了</div>
    <div class="toast-sub" id="vote-done-text"></div>
    <button class="toast-btn" style="background:var(--pass);" onclick="closeVoteDone()">ホームに戻る</button>
  </div>
</div>

<!-- コメント完了 -->
<div class="toast-popup" id="comment-done-popup">
  <div class="toast-box">
    <div class="toast-icon">💬</div>
    <div class="toast-title" style="color:var(--accent);">記録しました</div>
    <div class="toast-sub" id="comment-done-text"></div>
    <button class="toast-btn" style="background:var(--accent);" onclick="closeCommentDoneContinue()">続けて記録する</button>
    <button class="toast-link" onclick="closeCommentDoneHome()">ホームに戻る</button>
  </div>
</div>

<script>
const NAMES = ['中濱','黒井','伊藤','三村','青山','武居','松村','平本','松下'];
const DEFAULT_PLANS = NAMES.map(n => n + 'さんの投資計画');

const STATE = {
  plans: [], members: [], votes: {}, comments: [],
  currentVoter: null, selectedPlanId: null,
  BUDGET: 1000, THRESHOLD: 3000,
};

// XSS防止のためのエスケープ
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

window.addEventListener('load', () => {
  buildAdminInputs();
  loadFromStorage();
});

function buildAdminInputs() {
  const container = document.getElementById('plan-inputs');
  container.innerHTML = '';
  NAMES.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'plan-row';
    row.innerHTML = `
      <input type="text" value="${esc(name)}" class="plan-proposer-input">
      <input type="text" value="${esc(DEFAULT_PLANS[i])}" class="plan-name-input" oninput="autoSaveAdmin()">
    `;
    container.appendChild(row);
  });
}

function loadFromStorage() {
  const raw = localStorage.getItem('investmentVote2026');
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    // 事業名の復元
    if (data.adminData) {
      const nameInputs = document.querySelectorAll('.plan-name-input');
      data.adminData.forEach((d, i) => {
        if (nameInputs[i] && d.name) nameInputs[i].value = d.name;
      });
    }
    if (data.plans && data.plans.length > 0) {
      STATE.plans    = data.plans;
      STATE.members  = data.members || [];
      STATE.votes    = data.votes   || {};
      STATE.comments = data.comments || [];
      if (data.currentVoter && STATE.members.includes(data.currentVoter)) {
        STATE.currentVoter = data.currentVoter;
        showHome();
      } else {
        showNameSelect();
      }
    }
  } catch(e) { console.error('load error', e); }
}

function saveToStorage() {
  const raw  = localStorage.getItem('investmentVote2026');
  const prev = raw ? JSON.parse(raw) : {};
  localStorage.setItem('investmentVote2026', JSON.stringify({
    ...prev,
    plans: STATE.plans, members: STATE.members,
    votes: STATE.votes, comments: STATE.comments,
    currentVoter: STATE.currentVoter,
  }));
}

function autoSaveAdmin() {
  const data = getAdminInputData();
  const raw  = localStorage.getItem('investmentVote2026');
  const prev = raw ? JSON.parse(raw) : {};
  localStorage.setItem('investmentVote2026', JSON.stringify({ ...prev, adminData: data }));
}

function getAdminInputData() {
  const props = document.querySelectorAll('.plan-proposer-input');
  const names = document.querySelectorAll('.plan-name-input');
  return Array.from(props).map((p, i) => ({
    proposer: p.value.trim(), name: names[i].value.trim()
  }));
}

function startSession() {
  const data = getAdminInputData();
  STATE.plans = []; STATE.members = [];
  data.forEach((d, i) => {
    if (d.proposer && d.name) {
      STATE.plans.push({ id: `plan_${i}`, proposer: d.proposer, name: d.name });
      STATE.members.push(d.proposer);
    }
  });
  if (!STATE.plans.length) { alert('氏名と事業名を1件以上入力してください'); return; }
  STATE.votes    = {};
  STATE.comments = [];
  STATE.currentVoter = null;
  saveToStorage();
  showNameSelect();
}

function showAdmin() {
  const raw = localStorage.getItem('investmentVote2026');
  if (raw) {
    const data = JSON.parse(raw);
    if (data.adminData) {
      const nameInputs = document.querySelectorAll('.plan-name-input');
      data.adminData.forEach((d, i) => { if (nameInputs[i] && d.name) nameInputs[i].value = d.name; });
    }
  }
  showScreen('admin-screen');
}

// ===== NAME SELECT =====
function showNameSelect() {
  showScreen('name-select-screen');
  const grid = document.getElementById('name-grid');
  grid.innerHTML = '';
  STATE.members.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'name-btn';
    const avatar = document.createElement('div');
    avatar.className = 'name-avatar';
    avatar.textContent = name.charAt(0);
    const label = document.createElement('span');
    label.textContent = name;
    btn.appendChild(avatar);
    btn.appendChild(label);
    btn.onclick = () => selectName(name);
    grid.appendChild(btn);
  });
}

function selectName(name) {
  STATE.currentVoter = name;
  saveToStorage();
  showHome();
}

function changeName() { showNameSelect(); }

// ===== HOME =====
function showHome() {
  const name = STATE.currentVoter;
  document.getElementById('home-avatar').textContent = name.charAt(0);
  document.getElementById('home-name').textContent = name + ' さん';
  const hasVoted = STATE.votes[name] && Object.values(STATE.votes[name]).some(v => v > 0);
  document.getElementById('home-voted-badge').style.display = hasVoted ? 'block' : 'none';
  showScreen('home-screen');
}

function goHome() { showHome(); }

// ===== COMMENT =====
function goComment() {
  STATE.selectedPlanId = null;
  document.getElementById('comment-voter-label').textContent = STATE.currentVoter;
  document.getElementById('comment-textarea').value = '';

  // チップを生成（提案者名のみ表示してコンパクトに）
  const chipsEl = document.getElementById('comment-plan-chips');
  chipsEl.innerHTML = '';
  STATE.plans.forEach(plan => {
    const chip = document.createElement('button');
    chip.className = 'plan-chip';
    chip.id = `chip_${plan.id}`;
    // 提案者名と事業名（短縮）を表示
    const shortName = plan.name.length > 10 ? plan.name.slice(0,10) + '…' : plan.name;
    chip.innerHTML = `${esc(plan.proposer)}<span class="chip-sub">${esc(shortName)}</span>`;
    chip.onclick = () => selectCommentPlan(plan.id);
    chipsEl.appendChild(chip);
  });

  updateCommentSendBtn();
  showScreen('comment-screen');
  // キーボードを開く
  setTimeout(() => document.getElementById('comment-textarea').focus(), 100);
}

function selectCommentPlan(planId) {
  STATE.selectedPlanId = planId;
  document.querySelectorAll('.plan-chip').forEach(el => el.classList.remove('selected'));
  const chip = document.getElementById(`chip_${planId}`);
  if (chip) chip.classList.add('selected');
  updateCommentSendBtn();
}

function updateCommentSendBtn() {
  const hasText = (document.getElementById('comment-textarea').value || '').trim().length > 0;
  document.getElementById('comment-send-btn').disabled = !STATE.selectedPlanId || !hasText;
}

document.addEventListener('input', e => {
  if (e.target.id === 'comment-textarea') updateCommentSendBtn();
});

function submitComment() {
  const text = document.getElementById('comment-textarea').value.trim();
  if (!text || !STATE.selectedPlanId) return;
  const plan = STATE.plans.find(p => p.id === STATE.selectedPlanId);
  const now = new Date();
  const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  STATE.comments.push({
    id: Date.now(), voter: STATE.currentVoter,
    planId: STATE.selectedPlanId, planName: plan.name,
    text, time: timeStr, timestamp: now.getTime(),
  });
  saveToStorage();

  const doneText = document.getElementById('comment-done-text');
  doneText.textContent = `「${plan.name}」の意見を記録しました`;
  document.getElementById('comment-done-popup').classList.add('open');
}

function closeCommentDoneContinue() {
  document.getElementById('comment-done-popup').classList.remove('open');
  document.getElementById('comment-textarea').value = '';
  updateCommentSendBtn();
}

function closeCommentDoneHome() {
  document.getElementById('comment-done-popup').classList.remove('open');
  document.getElementById('comment-textarea').value = '';
  STATE.selectedPlanId = null;
  goHome();
}

// ===== VOTING =====
function goVote() { startVoting(STATE.currentVoter); }

function startVoting(voterName) {
  document.getElementById('voter-info-label').textContent = voterName;
  if (!STATE.votes[voterName]) STATE.votes[voterName] = {};
  STATE.plans.forEach(p => {
    if (STATE.votes[voterName][p.id] === undefined) STATE.votes[voterName][p.id] = 0;
    if (p.proposer === voterName) STATE.votes[voterName][p.id] = 0;
  });

  const container = document.getElementById('plans-container');
  container.innerHTML = '';
  STATE.plans.forEach(plan => {
    const isOwn = plan.proposer === voterName;
    const amount = isOwn ? 0 : (STATE.votes[voterName][plan.id] || 0);
    const card = document.createElement('div');
    card.className = `plan-card${amount > 0 ? ' has-vote' : ''}${isOwn ? ' own-plan' : ''}`;
    card.id = `card_${plan.id}`;

    const nameEl = document.createElement('div');
    nameEl.className = 'plan-name';
    nameEl.textContent = plan.name;
    const propEl = document.createElement('div');
    propEl.className = 'plan-proposer';
    propEl.textContent = plan.proposer;
    card.appendChild(nameEl);
    card.appendChild(propEl);

    if (isOwn) {
      const notice = document.createElement('div');
      notice.className = 'own-plan-notice';
      notice.textContent = '投票できません';
      card.appendChild(notice);
    } else {
      const ctrl = document.createElement('div');
      ctrl.className = 'vote-control';

      const minusBtn = document.createElement('button');
      minusBtn.className = 'vote-btn';
      minusBtn.textContent = '−';
      minusBtn.onclick = () => adjustVote(plan.id, -50);

      const amountEl = document.createElement('div');
      amountEl.className = 'vote-amount';
      amountEl.id = `amount_${plan.id}`;
      amountEl.innerHTML = `${amount}<span class="unit">万円</span>`;

      const plusBtn = document.createElement('button');
      plusBtn.className = 'vote-btn';
      plusBtn.textContent = '＋';
      plusBtn.onclick = () => adjustVote(plan.id, 50);

      ctrl.appendChild(minusBtn);
      ctrl.appendChild(amountEl);
      ctrl.appendChild(plusBtn);
      card.appendChild(ctrl);
    }
    container.appendChild(card);
  });

  updateBudgetDisplay();
  showScreen('voter-screen');
}

function getTotalAllocated() {
  const votes = STATE.votes[STATE.currentVoter] || {};
  return Object.values(votes).reduce((a,b) => a+b, 0);
}

function adjustVote(planId, delta) {
  const votes = STATE.votes[STATE.currentVoter];
  const current = votes[planId] || 0;
  const remaining = STATE.BUDGET - getTotalAllocated();
  let next = current + delta;
  if (next < 0) next = 0;
  if (delta > 0 && remaining < delta) next = current;
  votes[planId] = next;
  const amountEl = document.getElementById(`amount_${planId}`);
  if (amountEl) amountEl.innerHTML = `${next}<span class="unit">万円</span>`;
  const card = document.getElementById(`card_${planId}`);
  if (card) card.classList.toggle('has-vote', next > 0);
  updateBudgetDisplay();
}

function updateBudgetDisplay() {
  const total = getTotalAllocated();
  const remaining = STATE.BUDGET - total;
  const display = document.getElementById('remaining-display');
  const fill = document.getElementById('budget-fill');
  display.textContent = remaining.toLocaleString();
  if (remaining > 300) { display.className = 'budget-number ok'; fill.style.background = 'var(--pass)'; }
  else if (remaining > 0) { display.className = 'budget-number warn'; fill.style.background = 'var(--accent2)'; }
  else { display.className = 'budget-number over'; fill.style.background = '#e05555'; }
  fill.style.width = `${100 - (total / STATE.BUDGET * 100)}%`;
  const btn = document.getElementById('submit-btn');
  const summary = document.getElementById('submit-summary');
  if (total === 0) { btn.disabled = true; summary.textContent = '1万円以上配分してから確定してください'; }
  else if (remaining < 0) { btn.disabled = true; summary.textContent = `予算オーバー（${Math.abs(remaining)}万円超過）`; }
  else { btn.disabled = false; summary.textContent = `投資合計：${total}万円 ／ 残り：${remaining}万円`; }
}

function confirmSubmit() {
  const votes = STATE.votes[STATE.currentVoter] || {};
  const lines = STATE.plans.filter(p => (votes[p.id]||0) > 0).map(p => `・${p.name}：${votes[p.id]}万円`);
  if (!lines.length) return;
  document.getElementById('submit-modal-text').textContent = `${lines.join('\n')}\n\n合計：${getTotalAllocated()}万円`;
  openModal('submit-modal');
}

function submitVote() {
  closeModal('submit-modal');
  saveToStorage();
  const el = document.getElementById('vote-done-text');
  el.textContent = `${STATE.currentVoter} さんの投票を記録しました`;
  document.getElementById('vote-done-popup').classList.add('open');
}

function closeVoteDone() {
  document.getElementById('vote-done-popup').classList.remove('open');
  goHome();
}

// ===== RESULTS =====
function showResults() {
  showScreen('results-screen');
  switchResultTab('votes');
}

function switchResultTab(tab) {
  document.getElementById('tab-btn-votes').classList.toggle('active', tab === 'votes');
  document.getElementById('tab-btn-comments').classList.toggle('active', tab === 'comments');
  document.getElementById('tab-votes').style.display    = tab === 'votes' ? 'block' : 'none';
  document.getElementById('tab-comments').style.display = tab === 'comments' ? 'block' : 'none';
  if (tab === 'votes') renderVotes();
  else renderComments();
}

function renderVotes() {
  const votedCount = Object.keys(STATE.votes).filter(k => Object.values(STATE.votes[k]).some(v => v > 0)).length;
  const summary = document.getElementById('results-summary');
  summary.innerHTML = '';
  [
    { val: votedCount, label: '投票済み', color: 'var(--accent)' },
    { val: STATE.members.length - votedCount, label: '未投票', color: 'var(--muted)' },
    { val: STATE.members.length, label: '参加者', color: 'var(--gold)' },
    { val: STATE.THRESHOLD.toLocaleString() + '万円', label: '通過ライン', color: 'var(--pass)' },
  ].forEach(s => {
    const box = document.createElement('div');
    box.className = 'stat-box';
    const val = document.createElement('div');
    val.className = 'stat-value';
    val.style.color = s.color;
    val.textContent = s.val;
    const lbl = document.createElement('div');
    lbl.className = 'stat-label';
    lbl.textContent = s.label;
    box.appendChild(val); box.appendChild(lbl);
    summary.appendChild(box);
  });

  const planTotals = STATE.plans.map(plan => {
    let total = 0;
    const breakdown = STATE.members.map(member => {
      const amt = (STATE.votes[member]||{})[plan.id]||0;
      total += amt;
      return { member, amt };
    });
    return { ...plan, total, breakdown };
  }).sort((a,b) => b.total - a.total);

  const maxTotal = Math.max(...planTotals.map(p => p.total), STATE.THRESHOLD);
  const grid = document.getElementById('results-grid');
  grid.innerHTML = '';

  planTotals.forEach((plan, idx) => {
    const passed = plan.total >= STATE.THRESHOLD;
    const card = document.createElement('div');
    card.className = `result-card ${passed ? 'passed' : 'failed'}`;
    card.style.animationDelay = `${idx * 0.08}s`;

    const barPct = maxTotal > 0 ? (plan.total / maxTotal) * 100 : 0;

    // テキストノードで安全に設定
    const nameEl = document.createElement('div'); nameEl.className = 'result-plan-name'; nameEl.textContent = plan.name;
    const propEl = document.createElement('div'); propEl.className = 'result-proposer'; propEl.textContent = `提案者：${plan.proposer}`;
    const totalEl = document.createElement('div'); totalEl.className = `result-total ${passed ? 'pass-color' : 'fail-color'}`;
    totalEl.textContent = plan.total.toLocaleString();
    const unitSpan = document.createElement('span'); unitSpan.style.cssText = 'font-size:13px;color:var(--muted);font-weight:400'; unitSpan.textContent = '万円';
    totalEl.appendChild(unitSpan);

    const threshEl = document.createElement('div'); threshEl.style.cssText = 'font-size:12px;color:var(--muted);margin-bottom:8px;';
    threshEl.textContent = `通過ライン：${STATE.THRESHOLD.toLocaleString()}万円${passed ? ' ✅ 通過' : ` （あと${(STATE.THRESHOLD-plan.total).toLocaleString()}万円）`}`;

    const barWrap = document.createElement('div'); barWrap.className = 'result-bar-wrap';
    const bar = document.createElement('div'); bar.className = 'result-bar';
    bar.style.cssText = `width:${barPct}%;background:${passed?'var(--pass)':'var(--muted)'}`;
    barWrap.appendChild(bar);

    const bdDiv = document.createElement('div'); bdDiv.className = 'voter-breakdown';
    plan.breakdown.forEach(b => {
      const row = document.createElement('div'); row.className = 'voter-row';
      const bPct = STATE.BUDGET > 0 ? (b.amt / STATE.BUDGET) * 100 : 0;
      const nameCol = document.createElement('div'); nameCol.className = 'voter-name-col'; nameCol.textContent = b.member;
      const bw = document.createElement('div'); bw.className = 'voter-bar-wrap';
      const bb = document.createElement('div'); bb.className = 'voter-bar';
      bb.style.cssText = `width:${bPct}%;background:${b.amt>0?'var(--accent)':'transparent'}`;
      bw.appendChild(bb);
      const vv = document.createElement('div'); vv.className = 'voter-vote'; vv.textContent = b.amt > 0 ? b.amt+'万円' : '—';
      row.appendChild(nameCol); row.appendChild(bw); row.appendChild(vv);
      bdDiv.appendChild(row);
    });

    card.appendChild(nameEl); card.appendChild(propEl); card.appendChild(totalEl);
    card.appendChild(threshEl); card.appendChild(barWrap); card.appendChild(bdDiv);
    grid.appendChild(card);
  });
}

function renderComments() {
  const pane = document.getElementById('comments-pane');
  pane.innerHTML = '';

  if (!STATE.comments.length) {
    const empty = document.createElement('div');
    empty.className = 'no-comments';
    empty.textContent = 'まだ意見・質問は記録されていません';
    pane.appendChild(empty);
    return;
  }

  // 全件ヘッダー
  const hdr = document.createElement('div');
  hdr.style.cssText = 'font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;';
  hdr.textContent = `すべての意見・質問（${STATE.comments.length}件）`;
  pane.appendChild(hdr);

  // 全件リスト（時系列）
  [...STATE.comments].sort((a,b) => a.timestamp - b.timestamp).forEach(c => {
    const card = document.createElement('div');
    card.className = 'all-comment-card';

    const headerRow = document.createElement('div');
    headerRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:6px;';

    const avatar = document.createElement('div');
    avatar.className = 'comment-avatar';
    avatar.textContent = c.voter.charAt(0);

    const who = document.createElement('div');
    who.style.cssText = 'font-size:13px;font-weight:700;';
    who.textContent = c.voter;

    const when = document.createElement('div');
    when.style.cssText = 'font-size:11px;color:var(--muted);margin-left:auto;';
    when.textContent = c.time;

    headerRow.appendChild(avatar); headerRow.appendChild(who); headerRow.appendChild(when);

    const tag = document.createElement('div');
    tag.className = 'comment-plan-tag';
    tag.textContent = c.planName;

    const text = document.createElement('div');
    text.className = 'comment-text-content';
    text.textContent = c.text; // textContent でXSS防止

    card.appendChild(headerRow); card.appendChild(tag); card.appendChild(text);
    pane.appendChild(card);
  });

  // 提案別
  const planHdr = document.createElement('div');
  planHdr.style.cssText = 'font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:20px 0 8px;';
  planHdr.textContent = '提案別';
  pane.appendChild(planHdr);

  STATE.plans.forEach(p => {
    const cs = STATE.comments.filter(c => c.planId === p.id);
    if (!cs.length) return;

    const group = document.createElement('div');
    group.className = 'comment-plan-group';

    const titleEl = document.createElement('div');
    titleEl.className = 'comment-plan-title';
    const titleText = document.createElement('span');
    titleText.textContent = p.name;
    const badge = document.createElement('span');
    badge.className = 'comment-count-badge';
    badge.textContent = `${cs.length}件`;
    titleEl.appendChild(titleText); titleEl.appendChild(badge);
    group.appendChild(titleEl);

    cs.forEach(c => {
      const item = document.createElement('div');
      item.className = 'comment-item';
      const meta = document.createElement('div');
      meta.className = 'comment-meta';
      meta.textContent = `${c.voter} ・ ${c.time}`;
      const txt = document.createElement('div');
      txt.className = 'comment-text-content';
      txt.textContent = c.text;
      item.appendChild(meta); item.appendChild(txt);
      group.appendChild(item);
    });
    pane.appendChild(group);
  });
}

// ===== CSV =====
function exportResults() {
  const rows = STATE.plans.map(plan => {
    let total = 0;
    const row = { plan: plan.name, proposer: plan.proposer };
    STATE.members.forEach(m => { const a=(STATE.votes[m]||{})[plan.id]||0; total+=a; row[m]=a; });
    row['合計']=total; row['通過']=total>=STATE.THRESHOLD?'YES':'NO';
    return row;
  });
  const headers = ['事業名','提案者',...STATE.members,'合計（万円）','通過判定'];
  const csv = [headers,...rows.map(r=>[r.plan,r.proposer,...STATE.members.map(m=>r[m]||0),r['合計'],r['通過']])].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download = '投資計画_投票結果.csv'; a.click();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function confirmReset() { openModal('reset-modal'); }
function resetAll() { closeModal('reset-modal'); localStorage.removeItem('investmentVote2026'); location.reload(); }
</script>
